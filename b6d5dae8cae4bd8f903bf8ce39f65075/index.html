<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="referrer" content="no-referrer"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>A9 Team</title><style>
            .article-list {
                list-style: none;
                padding: 0;
                max-width: 800px; /* 桌面端最大宽度保持不变 */
                margin: 20px auto;
            }
    
            .article-item {
                border-bottom: 1px solid #eee;
                padding: 20px;
                transition: background 0.3s;
                display: flex;
                align-items: stretch;
            }
    
            .article-item:hover {
                background: #f9f9f9;
            }
    
            .article-cover {
                width: 40%;
                max-width: 200px;
                margin-right: 20px;
                overflow: hidden;
                flex-shrink: 0;
                transition: transform 0.3s ease;
                box-sizing: border-box;
                max-height: 150px;
            }
    
            .article-cover:hover {
                transform: scale(1.1);
            }
    
            .article-cover img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
    
            .article-content {
                flex: 1;
                width: 60%;
                box-sizing: border-box;
            }
    
            .article-title {
                font-size: 1.2em;
                margin: 0 0 10px;
                transition: color 0.3s;
            }

            .article-title:hover {
                color: #007bff;
                text-decoration: none;
            }
    
            .article-meta {
                color: #666;
                font-size: 0.9em;
                margin-bottom: 8px;
            }
    
            .article-author {
                margin-right: 15px;
            }
    
            .article-date {
                color: #999;
            }
    
            .article-description {
                color: #444;
                line-height: 1.6;
                margin: 10px 0;
                height: 48px;
                overflow: hidden;
                text-overflow: ellipsis;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
            }
    
            .article-link {
                color: #007bff;
                text-decoration: none;
                font-size: 0.9em;
            }
    
            /* 分页按钮样式 */
            .pagination {
                display: flex;
                justify-content: center;
                margin-top: 20px;
                margin-bottom: 20px;
            }
    
            .pagination-button {
                display: inline-block;
                padding: 10px 20px;
                margin: 0 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
                background-color: #fff;
                color: #333;
                text-decoration: none;
                cursor: pointer;
                transition: background-color 0.3s, border-color 0.3s, color 0.3s;
            }
    
            .pagination-button:hover {
                background-color: #f0f0f0;
                border-color: #bbb;
            }
    
            .pagination-button:disabled {
                background-color: #eee;
                color: #999;
                border-color: #ddd;
                cursor: not-allowed;
            }
    
            /*  Media Queries - 针对小屏幕设备优化  */
            @media (max-width: 768px) {  /*  2. 使用 Media Query，针对屏幕宽度小于 768px 的设备应用以下样式  */
                .article-list {
                    max-width: 100%;  /*  手机上文章列表宽度撑满屏幕  */
                    margin-left: 10px;   /*  左右留出少量边距，避免内容紧贴屏幕边缘  */
                    margin-right: 10px;
                }
    
                .article-item {
                    flex-direction: column; /*  手机上文章条目垂直排列  */
                    padding: 15px;       /*  略微减小 article-item 的内边距  */
                }
    
                .article-cover {
                    width: 100%;        /*  手机上封面宽度撑满容器  */
                    max-width: none;      /*  移除最大宽度限制  */
                    margin-right: 0;      /*  移除右侧外边距  */
                    margin-bottom: 10px;   /*  底部增加外边距，与文字内容分隔  */
                    max-height: none;      /*  移除最大高度限制，让图片根据自身比例显示，或者可以设置一个合适的 max-height */
                }
    
                .article-content {
                    width: 100%;        /*  手机上内容区域宽度撑满容器  */
                }
    
                .article-title {
                    font-size: 1.1em;   /*  略微减小标题字体大小  */
                }
    
                .article-description {
                    font-size: 0.95em;  /*  略微减小描述字体大小  */
                    height: auto;        /*  手机上取消固定高度，让描述文字完整显示，或者根据需要调整行数限制 */
                    -webkit-line-clamp: unset; /* 取消行数限制 */
                }
    
                .article-meta {
                    font-size: 0.85em;  /*  略微减小 meta 信息字体大小  */
                }
    
                .pagination-button {
                    padding: 8px 16px;   /*  略微减小分页按钮内边距，但保持可点击区域  */
                    margin: 0 5px;      /*  略微减小按钮间距  */
                }

                /* 取消手机端 article-cover 的悬浮放大效果 */
                .article-cover:hover {
                    transform: scale(1.0); /* 或者 transform: none;  都可以 */
                }
            }
